name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "type:feature"
  - title: "🐛 Fixes"
    labels:
      - "type:fix"
  - title: "🧰 Maintenance"
    labels:
      - "type:chore"
      - "type:refactor"
      - "type:perf"
  - title: "📝 Docs"
    labels:
      - "type:docs"
change-template: "- $TITLE (#$NUMBER) @${AUTHOR}"
change-title-escapes: '\<>`'
no-changes-template: "No user-facing changes."
include-pre-releases: false
